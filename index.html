    const PrefsCtx = createContext(null);
    function PrefsProvider({ children }) {
      const [theme, setTheme] = useState(() => localStorage.getItem('ntx-theme') || 'dark');
      const [lang, setLang] = useState(() => localStorage.getItem('ntx-lang') || 'az');
      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('ntx-theme', theme);
      }, [theme]);
      useEffect(() => {
        document.documentElement.setAttribute('lang', lang);
        localStorage.setItem('ntx-lang', lang);
      }, [lang]);
      const t = useCallback((key) => translations[lang][key] || key, [lang]);
      return h(PrefsCtx.Provider, { value: { theme, setTheme, lang, setLang, t } }, children);
    }
    const usePrefs = () => useContext(PrefsCtx);

    // UTILITIES
    // ============================================================
    const cn = (...c) => c.filter(Boolean).join(' ');
    const generateCode = () => Math.random().toString(36).substring(2, 8).toUpperCase();
    const formatDate = (d, lang = 'az') => {
      if (!d) return null;
      return new Date(d).toLocaleDateString(lang === 'az' ? 'az-AZ' : 'en-US', { day: '2-digit', month: 'short' });
    };
    const formatDateTime = (d, lang = 'az') => {
      if (!d) return '';
      return new Date(d).toLocaleString(lang === 'az' ? 'az-AZ' : 'en-US');
    };
    const initials = (name) => (name || '?').split(' ').map(n => n[0]).slice(0, 2).join('').toUpperCase();
    const colorFor = (id) => {
      const colors = ['ember', 'emerald', 'sky', 'violet', 'rose', 'cyan'];
      const idx = (id || '').split('').reduce((a, c) => a + c.charCodeAt(0), 0) % colors.length;
      return colors[idx];
    };
    const avatarBg = {
      ember: 'bg-orange-500 text-white',
      emerald: 'bg-emerald-600 text-white',
      sky: 'bg-sky-600 text-white',
      violet: 'bg-violet-600 text-white',
      rose: 'bg-rose-600 text-white',
      cyan: 'bg-cyan-600 text-white',
    };
    const formatDuration = (seconds) => {
      if (!seconds || seconds < 0) return '0m';
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      if (h === 0) return `${m}m`;
      return `${h}h ${m}m`;
    };
    const parseMentions = (text, members) => {
      const ids = [];
      const re = /@(\w+)/g;
      let m;
      while ((m = re.exec(text)) !== null) {
        const u = members.find(mb => mb.username === m[1]);
        if (u && !ids.includes(u.id)) ids.push(u.id);
      }
      return ids;
    };
    const renderWithMentions = (text, members) => {
      const parts = [];
      const re = /(@\w+)/g;
      let lastIdx = 0;
      let m;
      while ((m = re.exec(text)) !== null) {
        if (m.index > lastIdx) parts.push(text.slice(lastIdx, m.index));
        const uname = m[0].slice(1);
        const u = members.find(mb => mb.username === uname);
        if (u) parts.push(h('span', { key: m.index, className: 'mention' }, m[0]));
        else parts.push(m[0]);
        lastIdx = m.index + m[0].length;
      }
      if (lastIdx < text.length) parts.push(text.slice(lastIdx));
      return parts;
    };
    // ============================================================
    // AUTH CONTEXT
    // ============================================================
    const AuthCtx = createContext(null);
    function AuthProvider({ children }) {
      const [session, setSession] = useState(null);
      const [profile, setProfile] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          if (session) loadProfile(session.user.id);
          else setLoading(false);
        });
        const { data: { subscription } } = supabase.auth.onAuthStateChange((_e, s) => {
          setSession(s);
          if (s) loadProfile(s.user.id);
          else { setProfile(null); setLoading(false); }
        });
        return () => subscription.unsubscribe();
      }, []);

      const loadProfile = async (userId) => {
        const { data } = await supabase.from('profiles').select('*').eq('id', userId).maybeSingle();
        setProfile(data);
        setLoading(false);
      };
      const refreshProfile = () => session && loadProfile(session.user.id);
      const signOut = async () => { await supabase.auth.signOut(); };

      return h(AuthCtx.Provider, { value: { session, profile, loading, signOut, refreshProfile } }, children);
    }
    const useAuth = () => useContext(AuthCtx);

      const [view, setView] = useState('kanban');
      const [tasks, setTasks] = useState([]); const [members, setMembers] = useState([]);
      const [approvals, setApprovals] = useState([]);
      const [loading, setLoading] = useState(true);
      const [newTaskOpen, setNewTaskOpen] = useState(false);
      const [editingTask, setEditingTask] = useState(null);
      // Filters
      const [search, setSearch] = useState('');
      const [filterStatus, setFilterStatus] = useState('all');
      const [filterPriority, setFilterPriority] = useState('all');
      const [filterAssignee, setFilterAssignee] = useState('all');
      const [filterTag, setFilterTag] = useState('');
      const isLeader = team.my_role === 'leader';

      const loadData = useCallback(async () => {
        setLoading(true);
        const [tasksRes, membersRes, approvalsRes] = await Promise.all([
          supabase.from('tasks').select('*').eq('team_id', team.id).order('position').order('created_at', { ascending: false }),
          supabase.from('team_members').select('role, joined_at, profiles(*)').eq('team_id', team.id),
          supabase.from('task_approval_requests').select('*, tasks(title), profiles!task_approval_requests_requested_by_fkey(*)').eq('team_id', team.id).order('created_at', { ascending: false })
        ]);
        setTasks(tasksRes.data || []);
        setMembers((membersRes.data || []).filter(m => m.profiles).map(m => ({ ...m.profiles, role: m.role, joined_at: m.joined_at })));
        setApprovals(approvalsRes.data || []);
        setLoading(false);
      }, [team.id]);

      useEffect(() => { loadData(); }, [loadData]);

      useEffect(() => {
        const channel = supabase.channel(`team-${team.id}`)
          .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks', filter: `team_id=eq.${team.id}` }, loadData)
          .on('postgres_changes', { event: '*', schema: 'public', table: 'task_approval_requests', filter: `team_id=eq.${team.id}` }, loadData)
          .on('postgres_changes', { event: '*', schema: 'public', table: 'team_members', filter: `team_id=eq.${team.id}` }, loadData)
          .subscribe();
        return () => { supabase.removeChannel(channel); };
      }, [team.id, loadData]);

      const filteredTasks = useMemo(() => {
        return tasks.filter(task => {
          if (search && !task.title.toLowerCase().includes(search.toLowerCase()) && !(task.description || '').toLowerCase().includes(search.toLowerCase())) return false;
          if (filterStatus !== 'all' && task.status !== filterStatus) return false;
          if (filterPriority !== 'all' && task.priority !== filterPriority) return false;
          if (filterAssignee !== 'all') {
            if (filterAssignee === 'unassigned' && task.assignee_id) return false;
            if (filterAssignee !== 'unassigned' && task.assignee_id !== filterAssignee) return false;
          }
          if (filterTag && !(task.tags || []).some(tag => tag.toLowerCase().includes(filterTag.toLowerCase()))) return false;
          return true;
        });
      }, [tasks, search, filterStatus, filterPriority, filterAssignee, filterTag]);

      const allTags = useMemo(() => {
        const s = new Set();
        tasks.forEach(t => (t.tags || []).forEach(tag => s.add(tag)));
        return [...s];
      }, [tasks]);

      const pendingCount = approvals.filter(a => a.status === 'pending').length;
      const hasFilters = search || filterStatus !== 'all' || filterPriority !== 'all' || filterAssignee !== 'all' || filterTag;

      return h('div', { className: 'flex flex-col h-full overflow-hidden' },
        h('div', { className: 'border-b border-edge px-6 py-4 flex items-center justify-between flex-shrink-0 bg-base' },
          h('div', null,
            h('div', { className: 'flex items-center gap-3 mb-0.5' },
              h('h1', { className: 'text-xl font-semibold tracking-tight' }, team.name),
              isLeader ? h(Badge, { variant: 'leader' }, h(Crown, { className: 'w-2.5 h-2.5' }), t('leader'))
                : h(Badge, { variant: 'worker' }, h(UserIcon, { className: 'w-2.5 h-2.5' }), t('worker'))
            ),
            h('div', { className: 'flex items-center gap-3 text-xs text-ctext2' },
              h('span', null, members.length, ' ', t('membersCount')),
              h('span', { className: 'text-edge' }, '•'),
              h('span', { className: 'font-mono' }, t('teamCode'), ': ', team.team_code),
              h('button', { onClick: () => navigator.clipboard.writeText(team.team_code), className: 'text-ctext3 hover:text-accent' },
                h(Copy, { className: 'w-3 h-3' }))
            )
          ),
          tab === 'tasks' && h('div', { className: 'flex items-center gap-2' },
            h('div', { className: 'flex gap-1 p-0.5 bg-surface border border-edge rounded-md' },
              h('button', { onClick: () => setView('kanban'), className: cn('p-1.5 rounded transition-colors', view === 'kanban' ? 'bg-elev text-ctext' : 'text-ctext2 hover:text-ctext') },
                h(LayoutGrid, { className: 'w-4 h-4' })),
              h('button', { onClick: () => setView('list'), className: cn('p-1.5 rounded transition-colors', view === 'list' ? 'bg-elev text-ctext' : 'text-ctext2 hover:text-ctext') },
                h(List, { className: 'w-4 h-4' }))
            ),
            h(Button, { onClick: () => setNewTaskOpen(true) }, h(Plus, { className: 'w-4 h-4' }), t('newTask'))
          )
        ),
        h('div', { className: 'border-b border-edge px-6 flex gap-1 flex-shrink-0 bg-base' },
          [
            { id: 'tasks', label: t('tasks'), icon: CheckSquare },
            { id: 'approvals', label: t('approvals'), icon: Inbox, badge: pendingCount },
            { id: 'members', label: t('members'), icon: Users },
            { id: 'reports', label: t('reports'), icon: BarChart3 },
            { id: 'settings', label: t('settings'), icon: Settings, hidden: !isLeader },
          ].filter(t => !t.hidden).map(tt => h('button', {
            key: tt.id, onClick: () => setTab(tt.id),
            className: cn('px-3 py-3 text-sm flex items-center gap-2 border-b-2 -mb-px transition-colors',
              tab === tt.id ? 'border-accent text-ctext' : 'border-transparent text-ctext2 hover:text-ctext')
          },
            h(tt.icon, { className: 'w-3.5 h-3.5' }), tt.label,
            tt.badge > 0 && h('span', { className: 'bg-accent text-white text-[10px] font-semibold rounded-full px-1.5 py-0' }, tt.badge)
          ))
        ),
        // Filter bar (only on tasks tab)
        tab === 'tasks' && h('div', { className: 'border-b border-edge px-6 py-2.5 flex items-center gap-2 flex-wrap bg-surface' },
          h('div', { className: 'relative flex-1 min-w-[200px] max-w-xs' },
            h(Search, { className: 'absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-ctext3' }),
            h(Input, { value: search, onChange: e => setSearch(e.target.value), placeholder: t('searchTasks'), className: 'pl-8 py-1.5 text-xs' })
          ),
          h(Select, { value: filterStatus, onChange: e => setFilterStatus(e.target.value), className: 'w-auto py-1.5 text-xs' },
            h('option', { value: 'all' }, t('allStatuses')),
            STATUSES.map(s => h('option', { key: s.id, value: s.id }, t(s.tk)))
          ),
          h(Select, { value: filterPriority, onChange: e => setFilterPriority(e.target.value), className: 'w-auto py-1.5 text-xs' },
            h('option', { value: 'all' }, t('allPriorities')),
            PRIORITIES.map(p => h('option', { key: p.id, value: p.id }, t(p.tk)))
          ),
          h(Select, { value: filterAssignee, onChange: e => setFilterAssignee(e.target.value), className: 'w-auto py-1.5 text-xs' },
            h('option', { value: 'all' }, t('allAssignees')),
            h('option', { value: 'unassigned' }, t('unassigned')),
            members.map(m => h('option', { key: m.id, value: m.id }, m.full_name))
          ),
          allTags.length > 0 && h(Select, { value: filterTag, onChange: e => setFilterTag(e.target.value), className: 'w-auto py-1.5 text-xs' },
            h('option', { value: '' }, t('tags')),
            allTags.map(tg => h('option', { key: tg, value: tg }, '#' + tg))
          ),
          hasFilters && h('button', { onClick: () => { setSearch(''); setFilterStatus('all'); setFilterPriority('all'); setFilterAssignee('all'); setFilterTag(''); }, className: 'text-xs text-accent hover:underline' },
            t('clearFilters'))
        ),
        h('div', { className: 'flex-1 overflow-auto scrollbar-thin' },
          loading ? h('div', { className: 'flex items-center justify-center h-full' }, h(Spinner, { className: 'w-6 h-6 text-accent' }))
            : tab === 'tasks' ? h(TasksTab, { view, tasks: filteredTasks, allTasks: tasks, members, team, isLeader, onEdit: setEditingTask, onChange: loadData })
            : tab === 'approvals' ? h(ApprovalsTab, { approvals, team, isLeader, onChange: loadData })
            : tab === 'members' ? h(MembersTab, { members, team, isLeader, onChange: loadData })
            : tab === 'reports' ? h(ReportsTab, { tasks, members, team })
            : tab === 'settings' ? h(SettingsTab, { team, onChange: () => { loadData(); onTeamUpdate && onTeamUpdate(); } })
            : null
        ),
        h(Modal, { open: newTaskOpen, onClose: () => setNewTaskOpen(false), size: 'lg' },
          h(TaskForm, { team, members, onClose: () => setNewTaskOpen(false), onDone: () => { loadData(); setNewTaskOpen(false); } })
        ),
        h(Modal, { open: !!editingTask, onClose: () => setEditingTask(null), size: 'xl' },
          editingTask && h(TaskDetail, { task: editingTask, team, members, isLeader, onClose: () => setEditingTask(null), onChange: () => loadData() })
        )
      );
    }

    // ============================================================
    // TASKS TAB
    // ============================================================
    function TasksTab({ view, tasks, allTasks, members, team, isLeader, onEdit, onChange }) {
      const { t } = usePrefs();
      if (allTasks.length === 0) {
        return h('div', { className: 'p-12 text-center' },
          h('div', { className: 'inline-flex items-center justify-center w-16 h-16 rounded-full bg-elev mb-4' },
            h(CheckSquare, { className: 'w-7 h-7 text-ctext3' })
          ),
          h('h3', { className: 'text-lg font-semibold mb-1' }, t('noTasks')),
          h('p', { className: 'text-sm text-ctext2' }, t('noTasksDesc'))
        );
      }
      return view === 'kanban'
        ? h(KanbanView, { tasks, members, team, isLeader, onEdit, onChange })
        : h(ListView, { tasks, members, onEdit });
    }

    // ============================================================
    // KANBAN with DRAG & DROP
    // ============================================================
    function KanbanView({ tasks, members, team, isLeader, onEdit, onChange }) {
      const { profile } = useAuth(); const { t } = usePrefs();
      const [dragId, setDragId] = useState(null);
      const [dragOverCol, setDragOverCol] = useState(null);
      const [dropTarget, setDropTarget] = useState(null); // { task, newStatus }
      const [reqMsg, setReqMsg] = useState('');
      const [busy, setBusy] = useState(false);

      const needsApproval = (task, toStatus) => {
        if (isLeader) return false;
        const freePairs = [['todo', 'in_progress'], ['in_progress', 'todo']];
        return !freePairs.some(([a, b]) => task.status === a && toStatus === b);
      };

      const handleDrop = async (e, newStatus) => {
        e.preventDefault();
        setDragOverCol(null);
        const id = e.dataTransfer.getData('text/plain') || dragId;
        const task = tasks.find(t => t.id === id);
        setDragId(null);
        if (!task || task.status === newStatus) return;
        if (needsApproval(task, newStatus)) {
          setDropTarget({ task, newStatus });
        } else {
          await supabase.from('tasks').update({ status: newStatus }).eq('id', task.id);
          onChange();
        }
      };

      const submitApprovalReq = async () => {
        if (!dropTarget) return;
        setBusy(true);
        try {
          await supabase.from('task_approval_requests').insert({
            task_id: dropTarget.task.id, team_id: team.id, requested_by: profile.id,
            from_status: dropTarget.task.status, to_status: dropTarget.newStatus,
            message: reqMsg, status: 'pending'
          });
          setDropTarget(null); setReqMsg('');
          onChange();
        } finally { setBusy(false); }
      };

      return h('div', { className: 'p-6 flex gap-4 min-h-full' },
        STATUSES.map(status => {
          const colTasks = tasks.filter(tt => tt.status === status.id);
          return h('div', {
            key: status.id,
            className: cn('kanban-col w-72 flex-shrink-0 flex flex-col rounded-lg p-2 border border-transparent transition-colors', dragOverCol === status.id && 'drag-over'),
            onDragOver: (e) => { e.preventDefault(); setDragOverCol(status.id); },
            onDragLeave: () => setDragOverCol(null),
            onDrop: (e) => handleDrop(e, status.id)
          },
            h('div', { className: 'flex items-center justify-between mb-3 px-1' },
              h('div', { className: 'flex items-center gap-2' },
                h('div', { className: cn('w-2 h-2 rounded-full', `bg-${status.color}`) }),
                h('h3', { className: 'text-xs font-semibold uppercase tracking-wider' }, t(status.tk)),
                h('span', { className: 'text-xs text-ctext3 font-mono' }, colTasks.length)
              )
            ),
            h('div', { className: 'space-y-2 flex-1 min-h-[60px]' },
              colTasks.map(task => h(TaskCard, {
                key: task.id, task, members, isDragging: dragId === task.id,
                onDragStart: (e) => { e.dataTransfer.setData('text/plain', task.id); setDragId(task.id); e.dataTransfer.effectAllowed = 'move'; },
                onDragEnd: () => { setDragId(null); setDragOverCol(null); },
                onEdit
              }))
            )
          );
        }),
        // Approval request modal
        h(Modal, { open: !!dropTarget, onClose: () => { setDropTarget(null); setReqMsg(''); } },
          dropTarget && h('div', { className: 'p-6' },
            h('div', { className: 'flex items-center justify-between mb-4' },
              h('h3', { className: 'text-lg font-semibold flex items-center gap-2' },
                h(ShieldCheck, { className: 'w-5 h-5 text-accent' }), t('requiresApproval')),
              h('button', { onClick: () => setDropTarget(null), className: 'text-ctext2 hover:text-ctext' }, h(X, { className: 'w-5 h-5' }))
            ),
            h('p', { className: 'text-sm text-ctext2 mb-1' }, '"', dropTarget.task.title, '"'),
            h('div', { className: 'flex items-center gap-2 text-xs mb-4' },
              h(Badge, null, t(STATUSES.find(s => s.id === dropTarget.task.status).tk)),
              h(ArrowRight, { className: 'w-3 h-3 text-ctext3' }),
              h(Badge, { variant: 'ember' }, t(STATUSES.find(s => s.id === dropTarget.newStatus).tk))
            ),
            h(Textarea, { value: reqMsg, onChange: e => setReqMsg(e.target.value), rows: 2, placeholder: t('whyChange'), className: 'mb-3' }),
            h('div', { className: 'flex justify-end gap-2' },
              h(Button, { variant: 'ghost', onClick: () => setDropTarget(null) }, t('cancel')),
              h(Button, { onClick: submitApprovalReq, disabled: busy },
                busy && h(Spinner, { className: 'w-4 h-4' }), h(Send, { className: 'w-3.5 h-3.5' }), t('sendForApproval'))
            )
          )
        )
      );
    }

    function TaskCard({ task, members, isDragging, onDragStart, onDragEnd, onEdit }) {
      const { lang } = usePrefs();
      const assignee = members.find(m => m.id === task.assignee_id);
      return h('div', {
        draggable: true,
        onDragStart, onDragEnd,
        onClick: () => onEdit(task),
        'data-priority': task.priority,
        className: cn('bg-surface border border-edge hover:border-edge/80 rounded-md p-3 cursor-pointer transition-all', isDragging && 'task-drag')
      },
        h('div', { className: 'text-sm font-medium text-ctext mb-2 leading-snug' }, task.title),
        task.description && h('div', { className: 'text-xs text-ctext2 mb-3 line-clamp-2' }, task.description),
        (task.tags || []).length > 0 && h('div', { className: 'flex flex-wrap gap-1 mb-2' },
          task.tags.slice(0, 3).map(tag => h('span', { key: tag, className: 'tag-chip' }, '#', tag))
        ),
        h('div', { className: 'flex items-center justify-between gap-2' },
          h('div', { className: 'flex items-center gap-2 text-xs text-ctext3' },
            (task.start_date || task.due_date) && h('div', { className: 'flex items-center gap-1' },
              h(Calendar, { className: 'w-3 h-3' }),
              h('span', null, formatDate(task.due_date || task.start_date, lang))
            ),
            task.recurrence && h(Repeat, { className: 'w-3 h-3 text-accent' }),
            h(PriorityFlag, { priority: task.priority })
          ),
          assignee && h(Avatar, { user: assignee, size: 'xs' })
        )
      );
    }

    function PriorityFlag({ priority }) {
      const { t } = usePrefs();
      const map = {
        urgent: { color: 'text-accent', tk: 'priorityUrgent' },
        high: { color: 'text-amber-500', tk: 'priorityHigh' },
        medium: { color: 'text-ctext2', tk: 'priorityMedium' },
        low: { color: 'text-ctext3', tk: 'priorityLow' },

      return h('div', { className: cn('flex items-center gap-1', p.color), title: t(p.tk) },
        h(Flag, { className: 'w-3 h-3' })

    }

    function ListView({ tasks, members, onEdit }) {
      const { t, lang } = usePrefs();
      return h('div', { className: 'p-6' },
        h('div', { className: 'bg-surface border border-edge rounded-lg overflow-hidden' },
          h('div', { className: 'grid grid-cols-12 gap-3 px-4 py-2.5 border-b border-edge text-[10px] uppercase tracking-wider text-ctext3 font-semibold' },
            h('div', { className: 'col-span-4' }, t('title')),
            h('div', { className: 'col-span-2' }, t('status')),
            h('div', { className: 'col-span-1' }, t('priority')),
            h('div', { className: 'col-span-2' }, t('assignee')),
            h('div', { className: 'col-span-2' }, t('tags')),
            h('div', { className: 'col-span-1' }, t('dueDate'))
          ),
          tasks.map(task => {
            const assignee = members.find(m => m.id === task.assignee_id);
            const status = STATUSES.find(s => s.id === task.status);
            return h('div', {
              key: task.id, onClick: () => onEdit(task), 'data-priority': task.priority,
              className: 'grid grid-cols-12 gap-3 px-4 py-3 border-b border-edge last:border-0 hover:bg-elev cursor-pointer items-center'
            },
              h('div', { className: 'col-span-4 text-sm font-medium text-ctext truncate' }, task.title),
              h('div', { className: 'col-span-2' }, h('div', { className: 'flex items-center gap-1.5 text-xs text-ctext2' },
                h('div', { className: cn('w-1.5 h-1.5 rounded-full', `bg-${status?.color}`) }), t(status?.tk))),
              h('div', { className: 'col-span-1' }, h(PriorityFlag, { priority: task.priority })),
              h('div', { className: 'col-span-2' }, assignee ? h('div', { className: 'flex items-center gap-2' },
                h(Avatar, { user: assignee, size: 'xs' }), h('span', { className: 'text-xs text-ctext2 truncate' }, assignee.full_name)
              ) : h('span', { className: 'text-xs text-ctext3' }, '—')),
              h('div', { className: 'col-span-2 flex flex-wrap gap-1' },
                (task.tags || []).slice(0, 2).map(tg => h('span', { key: tg, className: 'tag-chip' }, '#', tg))
              ),
              h('div', { className: 'col-span-1 text-xs text-ctext2' }, formatDate(task.due_date, lang) || '—')
            );
          })
        )
      );
    }
    // ============================================================
    // TASK FORM (Create)
    // ============================================================
    function TaskForm({ team, members, onClose, onDone }) {
      const { profile } = useAuth(); const { t } = usePrefs();
      const [title, setTitle] = useState('');
      const [description, setDescription] = useState('');
      const [status, setStatus] = useState('todo');
      const [priority, setPriority] = useState('medium');
      const [assigneeId, setAssigneeId] = useState('');
      const [startDate, setStartDate] = useState('');
      const [dueDate, setDueDate] = useState('');
      const [estimated, setEstimated] = useState('');
      const [tags, setTags] = useState([]);
      const [tagInput, setTagInput] = useState('');
      const [recurType, setRecurType] = useState('none');
      const [recurInterval, setRecurInterval] = useState(1);
      const [err, setErr] = useState('');
      const [loading, setLoading] = useState(false);

      const addTag = () => {
        const v = tagInput.trim().toLowerCase().replace(/[^a-z0-9_-]/g, '');
        if (v && !tags.includes(v)) setTags([...tags, v]);
        setTagInput('');
      };

      const submit = async (e) => {
        e.preventDefault(); setErr(''); setLoading(true);
        try {
          const payload = {
            team_id: team.id, title, description, status, priority,
            assignee_id: assigneeId || null,
            start_date: startDate || null,
            due_date: dueDate || null,
            estimated_hours: estimated ? parseFloat(estimated) : null,
            tags,
            recurrence: recurType !== 'none' ? { type: recurType, interval: parseInt(recurInterval) || 1 } : null,
            created_by: profile.id,
          };
          const { error } = await supabase.from('tasks').insert(payload);
          if (error) throw error;
          onDone();
        } catch (e) { setErr(e.message); } finally { setLoading(false); }
      };

      return h('div', { className: 'p-6' },
        h('div', { className: 'flex items-center justify-between mb-5' },
          h('h2', { className: 'text-xl font-semibold' }, t('newTask')),
          h('button', { onClick: onClose, className: 'text-ctext2 hover:text-ctext' }, h(X, { className: 'w-5 h-5' }))
        ),
        h('form', { onSubmit: submit, className: 'space-y-4' },
          h('div', null,
            h(Label, null, t('title')),
            h(Input, { value: title, onChange: e => setTitle(e.target.value), required: true, autoFocus: true })
          ),
          h('div', null,
            h(Label, null, t('description')),
            h(Textarea, { value: description, onChange: e => setDescription(e.target.value), rows: 3 })
          ),
          h('div', { className: 'grid grid-cols-2 gap-3' },
            h('div', null, h(Label, null, t('status')),
              h(Select, { value: status, onChange: e => setStatus(e.target.value) },
                STATUSES.map(s => h('option', { key: s.id, value: s.id }, t(s.tk)))
              )
            ),
            h('div', null, h(Label, null, t('priority')),
              h(Select, { value: priority, onChange: e => setPriority(e.target.value) },
                PRIORITIES.map(p => h('option', { key: p.id, value: p.id }, t(p.tk)))
              )
            )
          ),
          h('div', { className: 'grid grid-cols-2 gap-3' },
            h('div', null, h(Label, null, t('assignee')),
              h(Select, { value: assigneeId, onChange: e => setAssigneeId(e.target.value) },
                h('option', { value: '' }, t('noone')),
                members.map(m => h('option', { key: m.id, value: m.id }, m.full_name))
              )
            ),
            h('div', null, h(Label, null, t('estimated')),
              h(Input, { type: 'number', step: '0.5', min: '0', value: estimated, onChange: e => setEstimated(e.target.value), placeholder: '0' })
            )
          ),
          h('div', { className: 'grid grid-cols-2 gap-3' },
            h('div', null, h(Label, null, t('startDate')),
              h(Input, { type: 'date', value: startDate, onChange: e => setStartDate(e.target.value) })
            ),
            h('div', null, h(Label, null, t('dueDate')),

    // ============================================================
    // TASK DETAIL — with chat, mentions, checklist, time tracking

    function TaskDetail({ task: initTask, team, members, isLeader, onClose, onChange }) {
      const { profile } = useAuth(); const { t, lang } = usePrefs();
      const [task, setTask] = useState(initTask);
      const [tab, setTab] = useState('chat');
      const [comments, setComments] = useState([]);
      const [checklist, setChecklist] = useState([]);
      const [timeEntries, setTimeEntries] = useState([]);
      const [activeTimer, setActiveTimer] = useState(null);
      const [pendingReq, setPendingReq] = useState(null);
      const [targetStatus, setTargetStatus] = useState(null);
      const [reqMessage, setReqMessage] = useState('');
      const [editing, setEditing] = useState(false);
      const [busy, setBusy] = useState(false);
      const [err, setErr] = useState('');
      const [timerTick, setTimerTick] = useState(0);

      const loadAll = useCallback(async () => {
        const [cRes, rRes, chRes, tRes] = await Promise.all([
          supabase.from('task_comments').select('*, profiles(*)').eq('task_id', task.id).order('created_at'),
          supabase.from('task_approval_requests').select('*').eq('task_id', task.id).eq('status', 'pending').maybeSingle(),
          supabase.from('task_checklist_items').select('*').eq('task_id', task.id).order('position').order('created_at'),
          supabase.from('task_time_entries').select('*, profiles(*)').eq('task_id', task.id).order('started_at', { ascending: false })
        ]);
        setComments(cRes.data || []);
        setPendingReq(rRes.data || null);
        setChecklist(chRes.data || []);
        setTimeEntries(tRes.data || []);
        setActiveTimer((tRes.data || []).find(e => e.user_id === profile.id && !e.ended_at) || null);
      }, [task.id, profile.id]);

      useEffect(() => { loadAll(); }, [loadAll]);

      // realtime for this task
      useEffect(() => {
        const ch = supabase.channel(`task-${task.id}`)
          .on('postgres_changes', { event: '*', schema: 'public', table: 'task_comments', filter: `task_id=eq.${task.id}` }, loadAll)
          .on('postgres_changes', { event: '*', schema: 'public', table: 'task_checklist_items', filter: `task_id=eq.${task.id}` }, loadAll)
          .on('postgres_changes', { event: '*', schema: 'public', table: 'task_time_entries', filter: `task_id=eq.${task.id}` }, loadAll)
          .subscribe();
        return () => supabase.removeChannel(ch);
      }, [task.id, loadAll]);

      // timer tick
      useEffect(() => {
        if (!activeTimer) return;
        const iv = setInterval(() => setTimerTick(x => x + 1), 1000);
        return () => clearInterval(iv);
      }, [activeTimer]);

      const assignee = members.find(m => m.id === task.assignee_id);
      const creator = members.find(m => m.id === task.created_by);
      const status = STATUSES.find(s => s.id === task.status);

      const needsApproval = (toStatus) => {
        if (isLeader) return false;
        const freePairs = [['todo', 'in_progress'], ['in_progress', 'todo']];
        return !freePairs.some(([a, b]) => task.status === a && toStatus === b);
      };

      const directMove = async (newStatus) => {
        setBusy(true); setErr('');
        try {
          const { error } = await supabase.from('tasks').update({ status: newStatus }).eq('id', task.id);
          if (error) throw error;
          setTask({ ...task, status: newStatus });
          onChange();
        } catch (e) { setErr(e.message); } finally { setBusy(false); }
      };

      const requestStatusChange = async (newStatus) => {
        setBusy(true); setErr('');
        try {
          const { error } = await supabase.from('task_approval_requests').insert({
            task_id: task.id, team_id: team.id, requested_by: profile.id,
            from_status: task.status, to_status: newStatus,
            message: reqMessage, status: 'pending'
          });
          if (error) throw error;
          setReqMessage(''); setTargetStatus(null);
          await loadAll(); onChange();
        } catch (e) { setErr(e.message); } finally { setBusy(false); }
      };

      const cancelRequest = async () => {
        setBusy(true);
        try {
          await supabase.from('task_approval_requests').delete().eq('id', pendingReq.id);
          await loadAll(); onChange();
        } finally { setBusy(false); }
      };

      const saveTaskEdit = async (updates) => {
        setBusy(true);
        try {
          const { data, error } = await supabase.from('tasks').update(updates).eq('id', task.id).select().single();
          if (error) throw error;
          setTask(data); setEditing(false); onChange();
        } catch (e) { setErr(e.message); } finally { setBusy(false); }
      };

      const deleteTask = async () => {
        if (!confirm(t('confirmDeleteTask'))) return;
        setBusy(true);
        try {
          await supabase.from('tasks').delete().eq('id', task.id);
          onChange(); onClose();
        } finally { setBusy(false); }
      };

      // Time tracking
      const startTimer = async () => {
        await supabase.from('task_time_entries').insert({
          task_id: task.id, team_id: team.id, user_id: profile.id, started_at: new Date().toISOString()

      };
      const stopTimer = async () => {
        if (!activeTimer) return;
        const end = new Date();
        const dur = Math.round((end - new Date(activeTimer.started_at)) / 1000);
        await supabase.from('task_time_entries').update({
          ended_at: end.toISOString(), duration_seconds: dur
        }).eq('id', activeTimer.id);
        loadAll();
      };

      const totalSeconds = useMemo(() => {
        const completed = timeEntries.filter(e => e.duration_seconds).reduce((a, e) => a + e.duration_seconds, 0);

                      t('startDate'), ': ', formatDate(task.start_date, lang))],
                  task.due_date && [h('span', { key: 'd1', className: 'text-edge' }, '•'),
                    h('div', { key: 'd2', className: 'flex items-center gap-1' }, h(Calendar, { className: 'w-3 h-3' }),
                      t('dueDate'), ': ', formatDate(task.due_date, lang))],
                  task.recurrence && [h('span', { key: 'r1', className: 'text-edge' }, '•'),
                    h('div', { key: 'r2', className: 'flex items-center gap-1 text-accent' },

              h(Settings, { className: 'w-4 h-4' })),
            h('button', { onClick: deleteTask, className: 'p-1.5 text-ctext2 hover:text-red-500 hover:bg-elev rounded', title: t('deleteTask') },
              h(Trash2, { className: 'w-4 h-4' })),
            h('button', { onClick: onClose, className: 'p-1.5 text-ctext2 hover:text-ctext hover:bg-elev rounded' },
              h(X, { className: 'w-5 h-5' }))
          )
        ),

        h('div', { className: 'flex-1 overflow-y-auto scrollbar-thin' },
          h('div', { className: 'grid grid-cols-3 gap-0' },
            // LEFT — main content
            h('div', { className: 'col-span-2 p-6 space-y-5 border-r border-edge' },
              !editing && task.description && h('div', { className: 'text-sm text-ctext2 whitespace-pre-wrap' }, task.description),
              // Status transition
              !editing && h('div', { className: 'p-4 bg-sunken border border-edge rounded-md' },
                h('div', { className: 'text-[10px] uppercase tracking-wider text-ctext3 mb-3 font-semibold flex items-center gap-1.5' },
                  h(ArrowRight, { className: 'w-3 h-3' }), t('statusChange')
                ),
                pendingReq ? h('div', { className: 'flex items-center justify-between gap-3' },
                  h('div', { className: 'flex items-center gap-2 text-sm' },
                    h(Hourglass, { className: 'w-4 h-4 text-amber-500' }),
                    h('span', null, t('awaitingApproval'), ': ',
                      h('span', { className: 'font-medium' }, t(STATUSES.find(s => s.id === pendingReq.from_status)?.tk)), ' ',
                      h(ArrowRight, { className: 'w-3 h-3 inline' }), ' ',
                      h('span', { className: 'font-medium text-accent' }, t(STATUSES.find(s => s.id === pendingReq.to_status)?.tk))
                    )

                      h('span', { className: 'font-medium text-accent' }, t(STATUSES.find(s => s.id === targetStatus)?.tk))
                    )
                  ),
                  h(Textarea, { value: reqMessage, onChange: e => setReqMessage(e.target.value), rows: 2, placeholder: t('whyChange'), className: 'mb-3' }),
                  h('div', { className: 'flex gap-2' },
                    h(Button, { size: 'sm', variant: 'ghost', onClick: () => { setTargetStatus(null); setReqMessage(''); } }, t('cancel')),
                    h(Button, { size: 'sm', onClick: () => requestStatusChange(targetStatus), disabled: busy },
                      busy && h(Spinner, { className: 'w-3 h-3' }), h(Send, { className: 'w-3.5 h-3.5' }), t('sendForApproval'))
                  )

    function EditTaskForm({ task, members, onSave, onCancel, busy }) {
      const { t } = usePrefs();
      const [title, setTitle] = useState(task.title);
      const [description, setDescription] = useState(task.description || '');
      const [priority, setPriority] = useState(task.priority);
      const [assigneeId, setAssigneeId] = useState(task.assignee_id || '');

      const [dueDate, setDueDate] = useState(task.due_date || '');

      const [tags, setTags] = useState(task.tags || []);
      const [tagInput, setTagInput] = useState('');

      const addTag = () => {
        const v = tagInput.trim().toLowerCase().replace(/[^a-z0-9_-]/g, '');

        setTagInput('');
      };

      return h('div', { className: 'space-y-3' },
        h(Input, { value: title, onChange: e => setTitle(e.target.value), className: 'text-lg font-medium' }),
        h(Textarea, { value: description, onChange: e => setDescription(e.target.value), rows: 3 }),
        h('div', { className: 'grid grid-cols-2 gap-2' },
          h(Select, { value: priority, onChange: e => setPriority(e.target.value) },
            PRIORITIES.map(p => h('option', { key: p.id, value: p.id }, t(p.tk)))
          ),
          h(Select, { value: assigneeId, onChange: e => setAssigneeId(e.target.value) },
            h('option', { value: '' }, t('noone')),
            members.map(m => h('option', { key: m.id, value: m.id }, m.full_name))
          )
        ),
        h('div', { className: 'grid grid-cols-3 gap-2' },
          h(Input, { type: 'date', value: startDate, onChange: e => setStartDate(e.target.value), title: t('startDate') }),
          h(Input, { type: 'date', value: dueDate, onChange: e => setDueDate(e.target.value), title: t('dueDate') }),
          h(Input, { type: 'number', step: '0.5', value: estimated, onChange: e => setEstimated(e.target.value), placeholder: t('estimated') })
        ),
        h('div', null,
          h('div', { className: 'flex flex-wrap gap-1.5 mb-2' },
            tags.map(tag => h('span', { key: tag, className: 'tag-chip' },
              '#', tag,
              h('button', { type: 'button', onClick: () => setTags(tags.filter(x => x !== tag)), className: 'ml-1 text-ctext3 hover:text-red-500' },
                h(X, { className: 'w-2.5 h-2.5' })
              )
            ))
          ),
          h(Input, {
            value: tagInput, onChange: e => setTagInput(e.target.value),
            onKeyDown: e => { if (e.key === 'Enter') { e.preventDefault(); addTag(); } },
            placeholder: t('tagsPlaceholder')
          })
        ),
        h('div', { className: 'flex gap-2' },
          h(Button, { size: 'sm', variant: 'ghost', onClick: onCancel, type: 'button' }, t('cancel')),
          h(Button, { size: 'sm', onClick: () => onSave({
            title, description, priority,
            assignee_id: assigneeId || null,
            start_date: startDate || null,
            due_date: dueDate || null,
            estimated_hours: estimated ? parseFloat(estimated) : null,
            tags
          }), disabled: busy },
            busy && h(Spinner, { className: 'w-3 h-3' }), t('save'))
        )
      );

    // ============================================================
    // CHAT PANEL with @mentions
    // ============================================================
    function ChatPanel({ task, team, members, comments, onChange }) {
      const { profile } = useAuth(); const { t, lang } = usePrefs();
      const [text, setText] = useState('');
      const [busy, setBusy] = useState(false);
      const [mentionOpen, setMentionOpen] = useState(false);
      const [mentionQuery, setMentionQuery] = useState('');
      const [mentionStart, setMentionStart] = useState(0);
      const inputRef = useRef(null);
      const scrollRef = useRef(null);

      useEffect(() => {
        if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
      }, [comments]);

      const handleChange = (e) => {
        const v = e.target.value;
        setText(v);
        const pos = e.target.selectionStart;
        const before = v.slice(0, pos);
        const m = before.match(/@(\w*)$/);
        if (m) {
          setMentionStart(pos - m[0].length);
          setMentionQuery(m[1]);
          setMentionOpen(true);
        } else setMentionOpen(false);
      };

      const insertMention = (member) => {
        const before = text.slice(0, mentionStart);
        const after = text.slice(mentionStart + 1 + mentionQuery.length);
        const newText = before + '@' + member.username + ' ' + after;
        setText(newText);
        setMentionOpen(false);
        setTimeout(() => inputRef.current?.focus(), 0);
      };

      const filteredMembers = useMemo(() => {
        const q = mentionQuery.toLowerCase();
        return members.filter(m => m.username.includes(q) || m.full_name.toLowerCase().includes(q)).slice(0, 5);
      }, [mentionQuery, members]);

      const submit = async (e) => {
        e.preventDefault();
        if (!text.trim()) return;
        setBusy(true);
        try {
          const mentions = parseMentions(text, members);
          await supabase.from('task_comments').insert({
            task_id: task.id, team_id: team.id, user_id: profile.id,
            content: text, mentioned_user_ids: mentions
          });
          setText('');
          await onChange();
        } finally { setBusy(false); }
      };

    // ============================================================
    // REPORTS TAB (with charts using SVG)
    // ============================================================
    function ReportsTab({ tasks, members, team }) {
      const { t, lang } = usePrefs();

      const stats = useMemo(() => {
        const total = tasks.length;
        const completed = tasks.filter(t => t.status === 'done').length;
        const active = tasks.filter(t => t.status === 'in_progress' || t.status === 'in_review').length;
        const overdue = tasks.filter(t => t.due_date && t.status !== 'done' && new Date(t.due_date) < new Date()).length;
        return { total, completed, active, overdue };
      }, [tasks]);

      const byStatus = useMemo(() => STATUSES.map(s => ({
        ...s, count: tasks.filter(tt => tt.status === s.id).length
      })), [tasks]);

      const byPriority = useMemo(() => PRIORITIES.map(p => ({
        ...p, count: tasks.filter(tt => tt.priority === p.id).length
      })), [tasks]);

      const byAssignee = useMemo(() => {
        const map = new Map();
        members.forEach(m => map.set(m.id, { user: m, count: 0, done: 0 }));
        tasks.forEach(tt => {
          if (tt.assignee_id && map.has(tt.assignee_id)) {
            const s = map.get(tt.assignee_id);
            s.count++;
            if (tt.status === 'done') s.done++;
          }
        });
        return [...map.values()].filter(x => x.count > 0).sort((a, b) => b.count - a.count);
      }, [tasks, members]);

      // Completion trend - last 30 days
      const trend = useMemo(() => {
        const days = [];
        for (let i = 29; i >= 0; i--) {
          const d = new Date(); d.setDate(d.getDate() - i); d.setHours(0, 0, 0, 0);
          const next = new Date(d); next.setDate(next.getDate() + 1);
          const cnt = tasks.filter(tt => tt.completed_at && new Date(tt.completed_at) >= d && new Date(tt.completed_at) < next).length;
          days.push({ date: d, count: cnt });
        }
        return days;
      }, [tasks]);

      const maxTrend = Math.max(1, ...trend.map(d => d.count));
      const maxStatusCount = Math.max(1, ...byStatus.map(s => s.count));
      const maxPriorityCount = Math.max(1, ...byPriority.map(p => p.count));

      if (tasks.length === 0) {
        return h('div', { className: 'p-12 text-center' },
          h('div', { className: 'inline-flex items-center justify-center w-16 h-16 rounded-full bg-elev mb-4' },
            h(BarChart3, { className: 'w-7 h-7 text-ctext3' })),
          h('h3', { className: 'text-lg font-semibold mb-1' }, t('noData')),
          h('p', { className: 'text-sm text-ctext2' }, t('noTasksDesc'))
        );
      }

      return h('div', { className: 'p-6 space-y-5 max-w-5xl' },
        // KPI cards
        h('div', { className: 'grid grid-cols-2 md:grid-cols-4 gap-3' },
          h(KpiCard, { label: t('totalTasks'), value: stats.total, icon: CheckSquare, color: 'text-ctext' }),
          h(KpiCard, { label: t('completedTasks'), value: stats.completed, icon: Check, color: 'text-emerald-500' }),
          h(KpiCard, { label: t('activeTasks'), value: stats.active, icon: Hourglass, color: 'text-sky-500' }),
          h(KpiCard, { label: t('overdueTasks'), value: stats.overdue, icon: AlertCircle, color: 'text-red-500' }),
        ),

        // Charts grid
        h('div', { className: 'grid lg:grid-cols-2 gap-4' },
          // By Status
          h('div', { className: 'bg-surface border border-edge rounded-lg p-5' },
            h('h3', { className: 'text-sm font-semibold mb-4' }, t('tasksByStatus')),
            h('div', { className: 'space-y-3' },
              byStatus.map(s => h('div', { key: s.id },
                h('div', { className: 'flex items-center justify-between text-xs mb-1' },
                  h('div', { className: 'flex items-center gap-2 text-ctext2' },
                    h('div', { className: cn('w-2 h-2 rounded-full', `bg-${s.color}`) }),
                    t(s.tk)
                  ),
                  h('span', { className: 'font-mono text-ctext' }, s.count)
                ),
                h('div', { className: 'h-2 bg-sunken rounded-full overflow-hidden' },
                  h('div', { className: cn('h-full transition-all', `bg-${s.color}`), style: { width: (s.count / maxStatusCount * 100) + '%' } })
                )
              ))
            )
          ),
          // By Priority
          h('div', { className: 'bg-surface border border-edge rounded-lg p-5' },
            h('h3', { className: 'text-sm font-semibold mb-4' }, t('tasksByPriority')),
            h('div', { className: 'space-y-3' },
              byPriority.map(p => {
                const colors = { urgent: 'bg-accent', high: 'bg-amber-500', medium: 'bg-ctext2', low: 'bg-ctext3' };
                return h('div', { key: p.id },
                  h('div', { className: 'flex items-center justify-between text-xs mb-1' },
                    h('div', { className: 'flex items-center gap-2 text-ctext2' },
                      h(Flag, { className: 'w-3 h-3' }), t(p.tk)),
                    h('span', { className: 'font-mono text-ctext' }, p.count)
                  ),
                  h('div', { className: 'h-2 bg-sunken rounded-full overflow-hidden' },
                    h('div', { className: cn('h-full transition-all', colors[p.id]), style: { width: (p.count / maxPriorityCount * 100) + '%' } })
                  )
                );
              })
            )
          ),
          // By Assignee
          h('div', { className: 'bg-surface border border-edge rounded-lg p-5' },
            h('h3', { className: 'text-sm font-semibold mb-4' }, t('tasksByAssignee')),
            byAssignee.length === 0 ? h('p', { className: 'text-sm text-ctext3' }, t('noData')) :
            h('div', { className: 'space-y-3' },
              byAssignee.map(a => h('div', { key: a.user.id, className: 'flex items-center gap-3' },
                h(Avatar, { user: a.user, size: 'sm' }),
                h('div', { className: 'flex-1 min-w-0' },
                  h('div', { className: 'flex items-center justify-between text-xs mb-1' },
                    h('span', { className: 'truncate text-ctext' }, a.user.full_name),
                    h('span', { className: 'font-mono text-ctext2' }, a.done, '/', a.count)
                  ),
                  h('div', { className: 'h-1.5 bg-sunken rounded-full overflow-hidden' },
                    h('div', { className: 'h-full bg-accent transition-all', style: { width: (a.done / a.count * 100) + '%' } })
                  )
                )
              ))
            )
          ),
          // Trend chart
          h('div', { className: 'bg-surface border border-edge rounded-lg p-5' },
            h('h3', { className: 'text-sm font-semibold mb-4' }, t('completionTrend')),
            h('svg', { viewBox: '0 0 600 200', className: 'w-full h-32' },
              // gridlines
              [0, 0.25, 0.5, 0.75, 1].map(p => h('line', {
                key: p, x1: 0, x2: 600, y1: 180 * p + 10, y2: 180 * p + 10,
                stroke: 'rgb(var(--c-edge-subtle))', strokeWidth: 1
              })),
              // bars
              trend.map((d, i) => {
                const barW = 600 / trend.length - 2;
                const barH = (d.count / maxTrend) * 170;
                return h('rect', {
                  key: i, x: i * (600 / trend.length) + 1, y: 190 - barH,
                  width: barW, height: barH,
                  fill: 'rgb(var(--c-accent))', opacity: d.count > 0 ? 0.8 : 0,
                  rx: 1
                });
              }),
              // labels (every 5th day)
              trend.map((d, i) => i % 5 === 0 && h('text', {
                key: 't' + i, x: i * (600 / trend.length) + (600 / trend.length / 2), y: 200,
                fontSize: 9, fill: 'rgb(var(--c-text-3))', textAnchor: 'middle'
              }, d.date.getDate() + '/' + (d.date.getMonth() + 1)))
            )
          )
        )
      );
    }

    function KpiCard({ label, value, icon: Icon, color }) {
      return h('div', { className: 'bg-surface border border-edge rounded-lg p-4' },
        h('div', { className: 'flex items-center justify-between mb-2' },
          h('span', { className: 'text-[10px] uppercase tracking-wider text-ctext3 font-semibold' }, label),
          h(Icon, { className: cn('w-4 h-4', color) })
        ),
        h('div', { className: 'text-2xl font-semibold' }, value)
      );
    }

    // ============================================================
    // ROOT
    // ============================================================
    function App() {
      const { session, loading, profile } = useAuth();
      const [needsProfile, setNeedsProfile] = useState(false);

      useEffect(() => {
        if (!loading && session && !profile) setNeedsProfile(true);
        else setNeedsProfile(false);
      }, [loading, session, profile]);

      if (loading) return h('div', { className: 'min-h-screen flex items-center justify-center' }, h(Spinner, { className: 'w-6 h-6 text-accent' }));
      if (!session) return h(AuthPage);
      if (needsProfile) return h(CompleteProfile);
      return h(AppShell);
    }

    function CompleteProfile() {
      const { session, refreshProfile } = useAuth(); const { t } = usePrefs();
      const [fullName, setFullName] = useState('');
      const [username, setUsername] = useState('');
      const [err, setErr] = useState(''); const [busy, setBusy] = useState(false);
      const submit = async (e) => {
        e.preventDefault(); setErr(''); setBusy(true);
        try {
          const clean = username.toLowerCase().replace(/[^a-z0-9_]/g, '');
          const { error } = await supabase.from('profiles').insert({ id: session.user.id, full_name: fullName, username: clean });
          if (error) throw error;
          refreshProfile();
        } catch (e) { setErr(e.message); } finally { setBusy(false); }
      };
      return h('div', { className: 'min-h-screen flex items-center justify-center p-6 relative' },
        h('div', { className: 'absolute top-6 right-6' }, h(PrefsToggle)),
        h('form', { onSubmit: submit, className: 'w-full max-w-sm bg-surface border border-edge rounded-lg p-6 space-y-4' },
          h('h2', { className: 'text-xl font-serif-italic mb-2' }, t('completeProfile')),
          h('div', null, h(Label, null, t('fullName')),
            h(Input, { value: fullName, onChange: e => setFullName(e.target.value), required: true })),
          h('div', null, h(Label, null, t('username')),
            h(Input, { value: username, onChange: e => setUsername(e.target.value), required: true })),
          err && h('div', { className: 'text-sm text-red-500' }, err),
          h(Button, { type: 'submit', disabled: busy, className: 'w-full justify-center' },
            busy && h(Spinner, { className: 'w-4 h-4' }), t('continueBtn'))
        )
      );
    }

    // ============================================================
    // RENDER
    // ============================================================
    function checkConfig() {
      if (SUPABASE_URL.includes('YOUR-PROJECT') || SUPABASE_ANON_KEY.includes('YOUR-ANON')) {
        const root = createRoot(document.getElementById('root'));
        root.render(h(PrefsProvider, null,
          h('div', { className: 'min-h-screen flex items-center justify-center p-6 relative' },
            h('div', { className: 'absolute top-6 right-6' }, h(PrefsToggle)),
            h('div', { className: 'max-w-lg bg-surface border border-amber-500/30 rounded-lg p-6' },
              h('div', { className: 'flex items-center gap-2 mb-3' },
                h(AlertCircle, { className: 'w-5 h-5 text-amber-500' }),
                h('h2', { className: 'text-lg font-semibold' }, 'Konfiqurasiya tələb olunur')
              ),
              h('p', { className: 'text-sm text-ctext2 mb-4' }, 'NextTaskX işləməsi üçün Supabase URL və Anon Key təyin edilməlidir.'),
              h('ol', { className: 'text-sm text-ctext2 space-y-2 list-decimal pl-5 mb-4' },
                h('li', null, 'Supabase Dashboard-da yeni layihə yaradın'),
                h('li', null, 'SQL Editor-də ', h('code', { className: 'text-accent font-mono' }, 'schema.sql'), ' faylını işlədin'),
                h('li', null, 'Project Settings → API-dən URL və anon key-i alın'),
                h('li', null, 'Bu HTML-də ', h('code', { className: 'text-accent font-mono' }, 'SUPABASE_URL'), ' və ', h('code', { className: 'text-accent font-mono' }, 'SUPABASE_ANON_KEY'), '-i yeniləyin')
              )
            )
          )
        ));
        return false;
      }
      return true;
    }

    if (checkConfig()) {
      const root = createRoot(document.getElementById('root'));
      root.render(h(PrefsProvider, null, h(AuthProvider, null, h(App))));
    }
  </script>
</body>
</html>
